# Daily Briefs Configuration
# ==========================
# This file controls all aspects of the arXiv paper curation system.
# Comments explain what each setting does and when you might change it.

# -----------------------------------------------------------------------------
# PATHS
# -----------------------------------------------------------------------------
# Where data is stored. All paths are relative to 'root' unless absolute.
# You typically only need to change 'root' for multi-agent setups.
paths:
  root: /home/node/.openclaw/workspace/Projects/daily-briefs
  db: data/papers.db           # SQLite database (single source of truth)
  text: data/text/             # Extracted paper text (~75KB each)
  embeddings: data/embeddings/ # FAISS index + embedding vectors
  filtered: data/filtered/     # Daily filtered results (JSON)
  reports: reports/            # Generated markdown reports
  logs: data/logs/             # Pipeline logs

# -----------------------------------------------------------------------------
# CATEGORIES
# -----------------------------------------------------------------------------
# arXiv categories to monitor, organized by priority tier.
# Tier determines filtering threshold (tier1 = low bar, tier3 = high bar).
#
# Tier 1: Your core interests. Most papers pass through.
# Tier 2: Adjacent fields. Only high-scoring papers included.
# Tier 3: Peripheral. Only exceptional papers (rarely included).
categories:
  tier1:
    - cs.AI   # Artificial Intelligence
    - cs.CL   # Computation and Language (NLP)
    - cs.CY   # Computers and Society
    - cs.LG   # Machine Learning
    - cs.NE   # Neural and Evolutionary Computing
    - stat.ML # Statistics - Machine Learning
    
  tier2:
    - cs.IR   # Information Retrieval
    - cs.CV   # Computer Vision
    - cs.SI   # Social and Information Networks
    - cs.HC   # Human-Computer Interaction
    - cs.GT   # Game Theory
    - cs.MA   # Multiagent Systems
    - cs.DL   # Digital Libraries
    - cs.CE   # Computational Engineering
    - cs.ET   # Emerging Technologies
    - cs.OH   # Other CS
    - cs.GL   # General Literature
    - stat.TH # Statistics Theory
    - math.IT # Information Theory
    - math.OC # Optimization and Control
    - math.PR # Probability
    - math.ST # Statistics Theory
    - math.DS # Dynamical Systems
    - math.MG # Metric Geometry
    - physics.hist-ph  # History of Physics
    - physics.soc-ph   # Physics and Society
    - cond-mat.dis-nn  # Disordered Systems / Neural Networks
    
  tier3:
    - cs.RO   # Robotics
    - cs.PL   # Programming Languages
    - cs.SY   # Systems and Control
    - q-bio.NC  # Neurons and Cognition
    - q-bio.PE  # Populations and Evolution
    - q-bio.OT  # Other Quantitative Biology
    - q-bio.QM  # Quantitative Methods
    - econ.EM   # Econometrics
    - econ.GN   # General Economics
    - econ.TH   # Theoretical Economics
    - eess.SY   # Systems and Control
    - eess.SP   # Signal Processing
    - cond-mat.stat-mech  # Statistical Mechanics
    - nlin.AO   # Adaptation and Self-Organizing Systems
    - nlin.CD   # Chaotic Dynamics
    - nlin.CG   # Cellular Automata

# -----------------------------------------------------------------------------
# INTERESTS
# -----------------------------------------------------------------------------
# Your research interests, used for the "Interest" filter stream.
# Papers matching these terms score higher in filtering.
#
# keywords: Individual terms/phrases to match in title/abstract
# project_contexts: Longer phrases describing active research projects
interests:
  keywords:
    - language model
    - LLM
    - transformer
    - attention mechanism
    - reasoning
    - chain of thought
    - RLHF
    - alignment
    - interpretability
    - mechanistic interpretability
    - emergent capabilities
    - scaling laws
    - in-context learning
    - prompt engineering
    - instruction tuning
    - fine-tuning
    - knowledge distillation
    - neural network
    - deep learning
    - representation learning
    - generalization
    - out-of-distribution
    - calibration
    - uncertainty quantification
    - Bayesian
    - information theory
    - complexity
    - cognitive science
    - human-AI interaction
    
  project_contexts:
    - V2G validator-to-generator
    - ranking loss training
    - LLM calibration
    - plausibility judgment

# -----------------------------------------------------------------------------
# FILTERING
# -----------------------------------------------------------------------------
# Controls how papers are scored and selected for daily briefs.
filtering:
  # Minimum score thresholds by tier (0.0 to 1.0)
  # Lower = more permissive, higher = more selective
  tier1_min_score: 0.1   # Tier 1: let most through
  tier2_min_score: 0.5   # Tier 2: need decent relevance
  tier3_min_score: 0.8   # Tier 3: only exceptional papers
  
  # How to combine citation sources for popularity score
  # (Semantic Scholar weight + OpenAlex weight should = 1.0)
  citation_weight_s2: 0.6      # Weight for Semantic Scholar citations
  citation_weight_oa: 0.4      # Weight for OpenAlex citations
  
  # How to combine keyword relevance vs popularity
  # Higher keyword_weight = prioritize your interests over citations
  keyword_weight: 0.6          # Weight for keyword/interest match
  popularity_weight: 0.4       # Weight for citation-based popularity
  
  # Papers just below threshold, shown for feedback calibration
  near_miss_multiplier: 0.8    # Near-miss if score >= threshold * multiplier
  near_miss_threshold: 0.05    # Lower bound for "not too low" rejected papers
  near_miss_count: 3           # How many near-misses to include
  
  # Serendipity: random samples to discover unexpected papers
  serendipity_count: 5         # Random samples per day
  
  # Random negatives: low-scored papers for calibration feedback
  random_negative_count: 2

# -----------------------------------------------------------------------------
# EMBEDDINGS & UMAP
# -----------------------------------------------------------------------------
# Settings for semantic embeddings and 2D visualization projection.
embeddings:
  # Embedding model (SPECTER)
  model_name: sentence-transformers/allenai-specter
  dimension: 768  # Embedding dimensionality for the model above
  
  # UMAP projection parameters for 2D visualization
  # See: https://umap-learn.readthedocs.io/en/latest/parameters.html
  umap_n_neighbors: 15   # Higher = more global structure, lower = more local
  umap_min_dist: 0.1     # Higher = more spread out, lower = tighter clusters
  umap_random_state: 42  # For reproducibility (though UMAP is inherently stochastic)

# -----------------------------------------------------------------------------
# SEARCH
# -----------------------------------------------------------------------------
# Default parameters for semantic and full-text search.
search:
  default_results: 10    # Number of results to return by default

# -----------------------------------------------------------------------------
# APIs
# -----------------------------------------------------------------------------
# External API settings for enrichment (citations) and ingestion.
apis:
  arxiv:
    rate_limit_seconds: 1.0    # Delay between RSS feed fetches
    retry_base_seconds: 5.0    # Base seconds for exponential backoff (2^attempt * base)
    
  semantic_scholar:
    enabled: true
    delay_seconds: 0.15        # Delay between requests (~6-7 req/sec)
    
  openalex:
    enabled: true
    delay_seconds: 0.1         # Delay between requests (~10 req/sec)

# -----------------------------------------------------------------------------
# STORAGE
# -----------------------------------------------------------------------------
# Controls what gets downloaded and kept.
storage:
  text_extract_delay: 0.5      # Sleep between PDF extractions (avoid rate spikes)
  pdf_timeout_seconds: 60      # PDF download timeout
  pdf_download_retries: 2      # Retry count for PDF download

# -----------------------------------------------------------------------------
# REPORTS
# -----------------------------------------------------------------------------
# Controls the daily markdown report format.
report:
  max_papers_per_stream: 10    # Max papers shown per stream (Popular/Interest/etc)
  max_authors: 3               # Truncate author list after N names (+ "et al.")
  include_abstract_preview: true
  abstract_preview_length: 300 # Characters to show in abstract preview

# -----------------------------------------------------------------------------
# GITHUB
# -----------------------------------------------------------------------------
# For feedback issue links in reports.
# Leave repo empty to disable feedback links.
github:
  repo: johnplake/daily-briefs

# -----------------------------------------------------------------------------
# DASHBOARD
# -----------------------------------------------------------------------------
# Settings for the Dash web dashboard (app.py).
dashboard:
  host: 127.0.0.1    # Use 0.0.0.0 to allow external access
  port: 8050
  max_search_results: 500  # Max rows returned for search results
